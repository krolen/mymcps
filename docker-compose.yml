version: '3.8'

services:
  mcp-servers:
    image: kkulagin/mcp-servers:latest
    container_name: mcp-servers
    restart: unless-stopped
    ports:
      - "7000:7000"
    volumes:
      - /mnt/MyPool/myapps/nfs/mcp:/app
    environment:
      - PYTHONUNBUFFERED=1
      - DANGEROUSLY_OMIT_AUTH=true
    working_dir: /app
